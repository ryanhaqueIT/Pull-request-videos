# PR Video Generator — auto-generates a demo video when a PR is opened.
#
# Workflow:
# 1. Check out PR branch
# 2. Install Python + dependencies + Playwright
# 3. If PR has a preview URL, record it. Otherwise record localhost.
# 4. Generate narration from the PR diff
# 5. Assemble final MP4 with FFmpeg
# 6. Upload as artifact and post link as PR comment

name: PR Demo Video

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to record"
        required: true
        default: "https://example.com"

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-video:
    runs-on: ubuntu-latest
    # Skip on draft PRs and dependabot
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.draft == false && github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Get PR diff
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt

      - name: Determine recording URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
          else
            # Default to example.com for MVP; in production, this would be a preview deployment URL
            echo "url=https://example.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate demo video
        run: |
          cd backend
          DIFF_ARG=""
          if [ -f /tmp/pr_diff.txt ]; then
            DIFF_ARG="--diff /tmp/pr_diff.txt"
          fi
          python __main__.py generate \
            --url "${{ steps.url.outputs.url }}" \
            --output /tmp/pr-demo.mp4 \
            $DIFF_ARG

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-demo-video
          path: /tmp/pr-demo.mp4
          retention-days: 30

      - name: Post PR comment with video link
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMENT="## PR Demo Video

          A demo video has been generated for this PR.

          **Download**: [pr-demo-video artifact](${RUN_URL}) (click Artifacts section)

          ---
          *Generated by PR Video pipeline | [View workflow run](${RUN_URL})*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
