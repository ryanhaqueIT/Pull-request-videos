# PR Video Generator — AI agent demos PR changes via video.
#
# Workflow:
# 1. Check out PR branch
# 2. Install Python + dependencies + Playwright
# 3. If ANTHROPIC_API_KEY is set, run AI agent (plans interactions from diff)
# 4. Otherwise, fall back to basic scroll recording
# 5. Upload video + screenshots as artifacts
# 6. Post PR comment with artifact links

name: PR Demo Video

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to record"
        required: true
        default: "https://example.com"

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-video:
    runs-on: ubuntu-latest
    # Skip on draft PRs and dependabot
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.draft == false && github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Get PR diff
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt

      - name: Determine recording URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.url }}" >> "$GITHUB_OUTPUT"
          else
            # Default to example.com for MVP; in production, this would be a preview deployment URL
            echo "url=https://example.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AI Agent Demo
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd backend
          DIFF_ARG=""
          if [ -f /tmp/pr_diff.txt ]; then
            DIFF_ARG="--diff /tmp/pr_diff.txt"
          fi
          python __main__.py agent \
            --url "${{ steps.url.outputs.url }}" \
            --output /tmp/pr-videos \
            --mode direct \
            $DIFF_ARG

      - name: Fallback to basic recording (no API key)
        if: env.ANTHROPIC_API_KEY == ''
        run: |
          cd backend
          DIFF_ARG=""
          if [ -f /tmp/pr_diff.txt ]; then
            DIFF_ARG="--diff /tmp/pr_diff.txt"
          fi
          python __main__.py generate \
            --url "${{ steps.url.outputs.url }}" \
            --output /tmp/pr-demo.mp4 \
            $DIFF_ARG

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-demo-video
          path: /tmp/pr-videos/
          retention-days: 30

      - name: Post PR comment with video link
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMENT="## 🤖 Agent Demo Video

          A demo video has been generated for this PR by an AI agent.

          **[Download artifacts](${RUN_URL})** (click Artifacts section)

          The agent analyzed the PR diff, planned interactions, and recorded itself demoing the changes.

          ---
          *Generated by PR Video Agent | Demos, not diffs*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
