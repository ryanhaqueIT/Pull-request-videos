# Doc-Gardening — weekly entropy cleanup for documentation drift.
# Generated by harness-engineering-bootstrap

name: Doc Gardening

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check AGENTS.md cross-references
        id: agents_refs
        run: |
          BROKEN=0
          if [ ! -f AGENTS.md ]; then
            echo "No AGENTS.md found — skipping"
            echo "agents_broken=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REFS=$(grep -oE '[a-zA-Z0-9_./-]+\.(md|py|sh|ts|tsx|json|yml|yaml)' AGENTS.md \
            | grep -v 'node_modules' | grep -v '.venv' | grep -v '^http' | sort -u)
          for ref in $REFS; do
            if echo "$ref" | grep -qE '^\*|^<|foo\.py|example'; then continue; fi
            if [ ! -f "$ref" ]; then
              echo "  BROKEN: AGENTS.md references '$ref' — file does not exist"
              BROKEN=$((BROKEN + 1))
            fi
          done
          echo "agents_broken=$BROKEN" >> "$GITHUB_OUTPUT"

      - name: Count TODO/FIXME/HACK comments
        id: todos
        run: |
          TODO_COUNT=$(grep -rn --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            -E '\b(TODO|FIXME|HACK|XXX)\b' . \
            --exclude-dir=.venv --exclude-dir=__pycache__ --exclude-dir=node_modules --exclude-dir=.git \
            2>/dev/null | wc -l || echo "0")
          TODO_COUNT=$(echo "$TODO_COUNT" | tr -d '[:space:]')
          echo "todo_count=$TODO_COUNT" >> "$GITHUB_OUTPUT"

      - name: Open GitHub issue if problems found
        if: steps.agents_refs.outputs.agents_broken != '0' || steps.todos.outputs.todo_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AGENTS_BROKEN=${{ steps.agents_refs.outputs.agents_broken }}
          TODO_COUNT=${{ steps.todos.outputs.todo_count }}
          gh issue create \
            --title "Doc Gardening: $(date -u +%Y-%m-%d) — ${AGENTS_BROKEN} broken refs, ${TODO_COUNT} TODOs" \
            --body "Automated weekly scan found documentation entropy. Run \`/entropy\` locally to investigate." \
            --label "documentation,automation"
